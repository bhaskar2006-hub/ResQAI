services:
  - type: web
    name: resqai-backend
    runtime: node
    rootDir: .
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: resqai-media
      - key: FRONTEND_URL
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: MAPS_API_KEY
        sync: false
